# Configurazione – Chatbot TU 81/08 RAG
# Modificare qui i parametri senza toccare il codice

data:
  raw_path: data/raw/
  processed_path: data/processed/
  supported_formats:
    - .pdf

chunking:
  strategy: per_articolo
  max_chunk_size: 2000        # caratteri — articoli molto lunghi vengono suddivisi per comma
  overlap: 0                  # non applicabile con chunking per articolo

embedding:
  model: paraphrase-multilingual-MiniLM-L12-v2   # multilingue, ottimale per italiano
  device: cpu

vector_store:
  type: faiss
  persist_path: outputs/models/faiss_index

retrieval:
  top_k: 5
  bm25_weight: 0.4
  semantic_weight: 0.6
  min_similarity: 0.55        # sotto soglia → fallback, nessuna chiamata LLM

reranker:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2   # 23MB, veloce, funziona su italiano tecnico
  top_k_candidates: 20        # candidati dal primo stage prima del re-ranking

llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0            # massimo determinismo per testo normativo
  max_tokens: 1024
  streaming: true

app:
  title: "Chatbot TU 81/08 – Sicurezza sul Lavoro"
  page_icon: "⚠️"
  deploy: streamlit

logging:
  queries_path: outputs/logs/queries.jsonl
